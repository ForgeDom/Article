<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="google-site-verification" content="RpBuMz6GXpwzltFrPZPg7Lu1ftNjVikzQcQNgEKuSoU" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      line-height: 1.75;
      color: #1a1a1a;
      background: #fff;
    }

    a { color: #0070f3; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: #0051a8; }

    /* Header */
    header {
      border-top: 3px solid #1a1a1a;
      border-bottom: 1px solid #eee;
      padding: 16px 0;
    }
    header .inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: -0.03em;
    }
    header nav a {
      font-size: 14px;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      margin-left: 20px;
    }
    header nav a:hover { color: #1a1a1a; }

    /* Main */
    main {
      max-width: 740px;
      margin: 48px auto;
      padding: 0 24px;
    }

    /* Post list */
    .post-list { list-style: none; }
    .post-list li {
      padding: 32px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list .meta {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
    }
    .post-list a.title {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: -0.02em;
      line-height: 1.3;
      display: block;
      margin-bottom: 8px;
    }
    .post-list a.title:hover { color: #0070f3; }
    .post-list .excerpt { font-size: 15px; color: #555; line-height: 1.6; }

    /* Post */
    .post-header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .post-header h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .post-header .meta { font-size: 13px; color: #999; }

    .post-content h2 {
      font-size: 24px;
      font-weight: 600;
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
      letter-spacing: -0.02em;
    }
    .post-content h3 {
      font-size: 19px;
      font-weight: 600;
      margin: 32px 0 12px;
    }
    .post-content p { margin-bottom: 24px; }
    .post-content ul, .post-content ol {
      margin: 0 0 24px 24px;
    }
    .post-content li { margin-bottom: 8px; }

    /* Code */
    code {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 13px;
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
      color: #d63384;
    }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px 24px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 14px;
    }

    /* Footer */
    footer {
      border-top: 1px solid #f0f0f0;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
    /* Blockquote — для intro цитат */
.post-content blockquote {
  border-left: 3px solid #0070f3;
  margin: 24px 0;
  padding: 12px 20px;
  background: #f0f7ff;
  border-radius: 0 8px 8px 0;
  font-style: normal;
  color: #1a1a1a;
}

/* Таблиці */
.post-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 24px 0;
  font-size: 14px;
}
.post-content th {
  background: #f4f4f4;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid #e0e0e0;
}
.post-content td {
  padding: 10px 14px;
  border-bottom: 1px solid #f0f0f0;
}
.post-content tr:hover td {
  background: #fafafa;
}

/* Чеклисти ✅ */
.post-content ul li {
  margin-bottom: 8px;
  line-height: 1.6;
}

/* FAQ секція */
.post-content strong {
  color: #1a1a1a;
}

/* Горизонтальна лінія */
.post-content hr {
  border: none;
  border-top: 1px solid #f0f0f0;
  margin: 40px 0;
}

/* Перший абзац після H1 — більший */
.post-content > p:first-child {
  font-size: 19px;
  color: #444;
  line-height: 1.7;
}

    @media (max-width: 600px) {
      .post-header h1 { font-size: 26px; }
      .post-list a.title { font-size: 18px; }
      body { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <a class="logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ site.time | date: '%Y' }} {{ site.title }}
  </footer>
</body>
</html>
